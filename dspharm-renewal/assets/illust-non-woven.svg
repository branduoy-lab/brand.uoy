<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280" role="img" aria-label="멸균4중부직포 일러스트">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f9f3"/>
      <stop offset="1" stop-color="#e8f1e8"/>
    </linearGradient>
  </defs>
  <rect width="480" height="280" fill="url(#nbg)"/>

  <!-- 4 layered fabric sheets, slightly offset -->
  <g transform="translate(110,55)">
    <!-- layer 4 (bottom) -->
    <g transform="translate(36,72)">
      <rect x="0" y="0" width="240" height="44" rx="6" fill="#ffffff" stroke="#3e803f" stroke-width="2"/>
      <g stroke="#3e803f" stroke-opacity=".25">
        <line x1="12" y1="14" x2="228" y2="14"/>
        <line x1="12" y1="22" x2="228" y2="22"/>
        <line x1="12" y1="30" x2="228" y2="30"/>
      </g>
      <text x="-22" y="28" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#3e803f" letter-spacing="1">04</text>
    </g>
    <!-- layer 3 -->
    <g transform="translate(24,48)">
      <rect x="0" y="0" width="240" height="44" rx="6" fill="#ffffff" stroke="#3e803f" stroke-width="2"/>
      <g stroke="#3e803f" stroke-opacity=".25">
        <line x1="12" y1="14" x2="228" y2="14"/>
        <line x1="12" y1="22" x2="228" y2="22"/>
        <line x1="12" y1="30" x2="228" y2="30"/>
      </g>
      <text x="-22" y="28" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#3e803f" letter-spacing="1">03</text>
    </g>
    <!-- layer 2 -->
    <g transform="translate(12,24)">
      <rect x="0" y="0" width="240" height="44" rx="6" fill="#ffffff" stroke="#3e803f" stroke-width="2"/>
      <g stroke="#3e803f" stroke-opacity=".25">
        <line x1="12" y1="14" x2="228" y2="14"/>
        <line x1="12" y1="22" x2="228" y2="22"/>
        <line x1="12" y1="30" x2="228" y2="30"/>
      </g>
      <text x="-22" y="28" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#3e803f" letter-spacing="1">02</text>
    </g>
    <!-- layer 1 (top) -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="240" height="44" rx="6" fill="#3e803f"/>
      <g stroke="#ffffff" stroke-opacity=".55">
        <line x1="12" y1="14" x2="228" y2="14"/>
        <line x1="12" y1="22" x2="228" y2="22"/>
        <line x1="12" y1="30" x2="228" y2="30"/>
      </g>
      <text x="-22" y="28" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#3e803f" letter-spacing="1">01</text>
    </g>
  </g>

  <!-- sterile badge -->
  <g transform="translate(380,30)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#3e803f" stroke-width="2" stroke-dasharray="3 3"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="9" fill="#3e803f" letter-spacing="1.4">STERILE</text>
    <text x="0" y="11" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="8" fill="#336b34" letter-spacing="1">4 LAYER</text>
  </g>
</svg>
